<section class="signin-page">
	<div class="signin-card">
		<h1>Sign In</h1>
		<p class="subtitle">Welcome back to Uniworld.</p>

		<form class="signin-form" (ngSubmit)="onSubmit()">
			<label for="email">Email</label>
			<input id="email" type="email" name="email" autocomplete="email" [(ngModel)]="email" required />

			<label for="password">Password</label>
			<input id="password" type="password" name="password" autocomplete="current-password" [(ngModel)]="password" required />

			<button type="submit" [disabled]="isSubmitting">{{ isSubmitting ? 'Signing in...' : 'Sign In' }}</button>

			<p *ngIf="errorMessage">{{ errorMessage }}</p>
		</form>

		<p class="signup-link">
			Don't have an account?
			<a routerLink="/signup">Create an account</a>
		</p>
	</div>
</section>
