<div class="profile">
    <p class="heading">User Profile</p>
    <img class="profile-pic" src="assets/logo/colored-logo.png" alt="Profile Picture">
    <a class="username" routerLink="/profile">{{ userName }}</a>
    <button type="button" class="logout-btn" (click)="logout()">Log Out</button>
</div>

<p class="heading">{{ searchQueue.length > 0 ? 'Search Player' : 'Quick Player' }}</p>

<p *ngIf="songsLoading" class="status">Loading songs...</p>

<app-player [queue]="activeQueue" [startIndex]="activeStartIndex"></app-player>
