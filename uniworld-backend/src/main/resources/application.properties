spring.application.name=uniworld-backend
server.port=8080

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:uniworlddb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
server.error.include-message=always

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
security.jwt.secret=VGhpc0lzQVN0cm9uZ1VuaXdvcmxkSldUU2VjcmV0S2V5Rm9yRGV2T25seQ==
security.jwt.expiration-ms=86400000

# Import local audio files on startup into H2 Song table
app.music.import-folder=../uniworld-frontend/src/app/assets/music

# Admin bootstrap (set with environment variables in local/dev; do not commit real values)
app.admin.email=${ADMIN_EMAIL:}
app.admin.password=${ADMIN_PASSWORD:}
app.admin.name=${ADMIN_NAME:Admin}
